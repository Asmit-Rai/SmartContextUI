<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>SmartContextUI</title>
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#06b6d4"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <!-- Background -->
          <rect width="36" height="36" rx="10" fill="url(#g1)"/>
          <!-- Code brackets representing UI context -->
          <path d="M10 10L6 18l4 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
          <path d="M26 10l4 8-4 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
          <!-- Neural/smart nodes -->
          <circle cx="18" cy="12" r="2.5" fill="#fff"/>
          <circle cx="13" cy="20" r="2" fill="#fff" opacity="0.9"/>
          <circle cx="23" cy="20" r="2" fill="#fff" opacity="0.9"/>
          <circle cx="18" cy="26" r="1.8" fill="#fff" opacity="0.8"/>
          <!-- Connecting lines (neural network / context links) -->
          <line x1="18" y1="14.5" x2="13" y2="18" stroke="#fff" stroke-width="1.3" opacity="0.6"/>
          <line x1="18" y1="14.5" x2="23" y2="18" stroke="#fff" stroke-width="1.3" opacity="0.6"/>
          <line x1="13" y1="22" x2="18" y2="24.2" stroke="#fff" stroke-width="1.3" opacity="0.6"/>
          <line x1="23" y1="22" x2="18" y2="24.2" stroke="#fff" stroke-width="1.3" opacity="0.6"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="title">SmartContextUI</h1>
        <p class="subtitle">Your smart UI assistant</p>
      </div>
    </div>

    <div class="card">
      <div class="setting-row">
        <span class="setting-label">Extension Enabled</span>
        <label class="toggle">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="instructions">
      <div class="instructions-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M7 6v4M7 4.5v0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span>Right-click any element and select <strong>SmartContextUI</strong> to understand what it does.</span>
    </div>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
